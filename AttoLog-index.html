<div id="root"><div id="boot-status">Loading AttoLog…</div></div>

<script>
  // Global safety net: if anything below throws or the CDN scripts fail to load,
  // this guarantees the user sees a real error message instead of a blank screen.
  window.addEventListener("error", function (e) {
    var root = document.getElementById("root");
    if (root && root.querySelector("#boot-status")) {
      root.innerHTML =
        '<div style="color:#F1F5F9;background:#0B1420;min-height:100vh;padding:24px;font-family:-apple-system,sans-serif;box-sizing:border-box;">' +
        '<h2 style="color:#F87171;font-size:17px;">AttoLog failed to load</h2>' +
        '<p style="font-size:13px;color:#94A3B8;">' + (e.message || "Unknown error") + '</p>' +
        '<p style="font-size:12px;color:#64748B;margin-top:16px;">Source: ' + (e.filename || "inline") + (e.lineno ? (" line " + e.lineno) : "") + '</p>' +
        '</div>';
    }
  });
  setTimeout(function () {
    var status = document.getElementById("boot-status");
    if (status) {
      status.innerHTML = "Still loading… this is taking longer than expected.<br/>If this doesn't resolve, your network may be blocking unpkg.com.";
    }
  }, 6000);
</script>
